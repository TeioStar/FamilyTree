<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>云谱档案 · 家谱管理系统</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>云谱档案</h1>
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="搜索姓名、字辈或房支" aria-label="搜索姓名、字辈或房支">
          <button id="searchButton" type="button">寻人</button>
          <button id="zoomOutButton" type="button">缩小</button>
          <button id="zoomInButton" type="button">放大</button>
          <button id="resetButton" type="button">归位</button>
        </div>
        <div class="seal">谱</div>
      </header>

      <main class="workspace">
        <aside id="familyRegistry" class="panel registry-panel">
          <h2>家谱库</h2>
          <div id="familyList" class="family-list">正在读取家谱文件...</div>
          <div class="workflow">
            <strong>系统流程</strong>
            <ol>
              <li>选择家谱文件</li>
              <li>录入人物</li>
              <li>建立关系</li>
              <li>补充事件与资料</li>
            </ol>
          </div>
        </aside>

        <section class="panel tree-panel" aria-label="家谱图">
          <svg id="familyCanvas" viewBox="0 0 960 620" preserveAspectRatio="xMidYMid meet">
            <defs>
              <pattern id="riceGrid" width="48" height="48" patternUnits="userSpaceOnUse">
                <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(111, 74, 45, 0.12)" stroke-width="1"></path>
              </pattern>
            </defs>
            <rect width="960" height="620" fill="url(#riceGrid)"></rect>
            <g id="treeViewport"></g>
          </svg>
        </section>

        <aside id="dossierPanel" class="panel dossier-panel">
          <h2>人物档案</h2>
          <p>选择族谱节点后，此处显示人物生平、关系链与关键事件。</p>
        </aside>

        <section class="panel timeline-panel">
          <h2>家族时间轴</h2>
          <label for="timelineYear">当前年份 <span id="timelineCurrentYear">1910</span></label>
          <input id="timelineYear" type="range" min="1840" max="2026" value="1910">
          <div id="timelineEvents" class="timeline-events"></div>
        </section>

        <section id="managementPanel" class="panel management-panel">
          <div class="management-header">
            <div>
              <h2>管理台</h2>
              <p>当前对象：<strong id="selectedName">未选择</strong></p>
            </div>
            <p id="systemStatus">系统已连接后端 API。</p>
          </div>

          <div class="tabs" role="tablist">
            <button class="is-active" data-tab="person" type="button">人物</button>
            <button data-tab="relationship" type="button">关系</button>
            <button data-tab="event" type="button">事件</button>
            <button data-tab="archive" type="button">资料</button>
          </div>

          <form id="personForm" class="management-grid management-pane is-active" data-pane="person">
            <label>姓名 <input id="personName" required></label>
            <label>字辈 <input id="personGeneration" required></label>
            <label>房支 <input id="personBranch" required></label>
            <label>生卒 <input id="personYears" pattern="\d{4}-\d{4}" required></label>
            <label class="wide">生平摘要 <textarea id="personSummary"></textarea></label>
            <div class="form-actions">
              <button id="newPersonButton" type="button">新增人物</button>
              <button type="submit">保存人物</button>
            </div>
          </form>

          <form id="relationshipForm" class="management-grid management-pane" data-pane="relationship">
            <label>人物 <select id="relationshipSource" required></select></label>
            <label>关系 <select id="relationshipType" required>
              <option value="parent">父母/子女</option>
              <option value="spouse">配偶</option>
              <option value="adoptive">收养</option>
              <option value="collateral">旁系</option>
            </select></label>
            <label>关联人物 <select id="relationshipTarget" required></select></label>
            <div class="form-actions">
              <button type="submit">保存关系</button>
            </div>
          </form>

          <form id="eventForm" class="management-grid management-pane" data-pane="event">
            <label>人物 <select id="eventPerson" required></select></label>
            <label>年份 <input id="eventYear" type="number" min="1" max="9999" value="1910" required></label>
            <label class="wide">纪事标题 <input id="eventTitle" value="家族纪事待补录" required></label>
            <div class="form-actions">
              <button type="submit">保存事件</button>
            </div>
          </form>

          <form id="archiveForm" class="management-grid management-pane" data-pane="archive">
            <label>人物 <select id="archivePerson" required></select></label>
            <label>类型 <select id="archiveType" required>
              <option value="manuscript">族谱手稿</option>
              <option value="photo">照片</option>
              <option value="epitaph">墓志</option>
              <option value="oral">口述记录</option>
              <option value="contract">契据</option>
              <option value="other">其他</option>
            </select></label>
            <label>资料标题 <input id="archiveTitle" value="资料待归档" required></label>
            <label>来源 <input id="archiveSource" value="家族整理" required></label>
            <div class="form-actions">
              <button type="submit">保存资料</button>
            </div>
          </form>

          <section class="records-panel" aria-label="数据清单">
            <div>
              <h3>人物清单</h3>
              <div id="personRecords" class="record-list"></div>
            </div>
            <div>
              <h3>关系列表</h3>
              <div id="relationshipRecords" class="record-list"></div>
            </div>
            <div>
              <h3>事件列表</h3>
              <div id="eventRecords" class="record-list"></div>
            </div>
            <div>
              <h3>资料列表</h3>
              <div id="archiveRecords" class="record-list"></div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
